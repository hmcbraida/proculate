[[repos]]
repo = "local"

[[repos.hooks]]
id = "no-ai-dash"
name = "Replace em dashes with -- "
language = "system"
entry = "sh -c 'for f in \"$@\"; do sed -i \"s/— /-- /g\" \"$f\"; done' --"
types = ["text"]
exclude = {glob = ["^bun\\.lock$", "prek\\.toml"]}

[[repos.hooks]]
id = "rust_lint"
name = "Lint (clippy)"
language = "system"
entry = "cargo clippy -- -Dwarnings"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "rust_test"
name = "Test rust"
language = "system"
entry = "cargo test"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "frontend_lint"
name = "Lint (eslint + biome)"
language = "system"
entry = "sh -c 'cd proculate-web && bun run lint'"
pass_filenames = false
always_run = true
